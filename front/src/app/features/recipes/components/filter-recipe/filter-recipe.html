<div class="filters-container">
    <h2 class="filters-title">🍓 Filtres des recettes de saison</h2>

    <div class="filters-grid">
        <div class="filter-card">
            <app-filter-string
                label="Nom de la recette"
                (valueChange)="onSearchChange($event)"
            ></app-filter-string>
        </div>

        <div class="filter-card">
            <app-filter-boolean
                label="Cuit au four"
                (valueChange)="onOvenChange($event)"
            ></app-filter-boolean>
        </div>

        <div class="filter-card">
            <app-multi-select
                label="Aliments à inclure"
                [options]="foodOptions()"
                (valueChange)="onIncludeFoodsChange($event)"
            ></app-multi-select>
        </div>

        <div class="filter-card">
            <app-multi-select
                label="Aliments à exclure"
                [options]="foodOptions()"
                (valueChange)="onExludeFoodsChange($event)"
            ></app-multi-select>
        </div>

        <div class="filter-card">
            <app-filter-range
                label="Temps de préparation"
                (valueChange)="onPreparationTimeChange($event)"
            ></app-filter-range>
        </div>

        <div class="filter-card wide">
            <app-multi-select
                label="Mois"
                [options]="monthOptions"
                (valueChange)="onMonthsChange($event)"
            ></app-multi-select>
        </div>
    </div>
</div>
