<div class="proposal-form">
    <div class="filter-card">
        <app-filter-string
            label="Nom de l'aliment *"
            [value]="name()"
            (valueChange)="name.set($event)"
        ></app-filter-string>
    </div>

    <div class="filter-card">
        <app-single-select
            label="Catégorie *"
            [options]="categoryOptions"
            [value]="category()"
            (valueChange)="category.set($event)"
        ></app-single-select>
    </div>

    <div>
        <app-multi-select
            label="Mois de disponibilité *"
            [options]="monthOptions"
            [value]="months()"
            (valueChange)="months.set($event)"
        ></app-multi-select>
    </div>

    <button
        class="submit-button"
        [disabled]="isSubmitting()"
        (click)="submitProposal()"
    >
        @if (isSubmitting()) { Envoi en cours... } @else { Proposer cet
        ingrédient }
    </button>

    @if (errorMessage()) {
    <div class="message error">{{ errorMessage() }}</div>
    } @if (successMessage()) {
    <div class="message success">{{ successMessage() }}</div>
    }
</div>
